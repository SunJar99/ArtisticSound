services:
  - type: web
    name: artisticsound
    plan: free
    runtime: python
    
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    
    startCommand: >
      gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "artisticsound.onrender.com,.onrender.com"
      - key: DB_ENGINE
        value: "django.db.backends.postgresql"
      - key: DB_NAME
        value: "artisticsound"
      - key: DB_USER
        value: "artisticsound_user"
      - key: DATABASE_URL
        fromDatabase:
          name: artisticsound-db
          property: connectionString
    
    healthCheckPath: /

databases:
  - name: artisticsound-db
    plan: free
    ipAllowList:
      - source: "%"
        description: "Allow all"
