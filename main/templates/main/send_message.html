<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Message - ArtisticSound</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }
        
        .header-logo {
            color: white;
            font-weight: bold;
            font-size: 1.5em;
            text-decoration: none;
        }
        
        .header a {
            color: white;
            text-decoration: none;
            font-size: 0.95em;
            transition: opacity 0.3s;
        }
        
        .header a:hover {
            opacity: 0.8;
        }
        
        .header-links {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .main-content {
            flex: 1;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }
        
        .container h2 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .recipient-info {
            padding: 15px;
            background: #f0f0ff;
            border-left: 4px solid #667eea;
            margin-bottom: 20px;
            border-radius: 5px;
            color: #666;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1em;
            transition: border-color 0.3s;
            box-sizing: border-box;
            resize: vertical;
            min-height: 150px;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.3s;
        }
        
        button[type="submit"] {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        button[type="submit"]:hover {
            transform: translateY(-2px);
        }
        
        .btn-cancel {
            background: #e0e0e0;
            color: #333;
        }
        
        .btn-cancel:hover {
            background: #d0d0d0;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="{% url 'main:home' %}" class="header-logo">🎵 ArtisticSound</a>
        <div class="header-links">
            {% if user.is_authenticated %}
                <a href="{% url 'main:post_list' %}">Browse Posts</a>
                <a href="{% url 'main:project_list' %}">Find Projects</a>
                <a href="{% url 'main:unified_chat' %}">Chat</a>
                <a href="{% url 'main:settings' %}">Settings</a>
                <a href="{% url 'main:logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'main:register' %}">Create Account</a>
                <a href="{% url 'main:login' %}">Login</a>
            {% endif %}
        </div>
    </div>
    
    <div class="main-content">
        <div class="container">
            <h2>Send Message</h2>
            
            <div class="recipient-info">
                <strong>To:</strong> {{ recipient.username }}
            </div>
            
            <form method="POST">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>Message</label>
                    {{ form.content }}
                </div>
                
                <div class="buttons">
                    <button type="submit">Send</button>
                    <button type="button" class="btn-cancel" onclick="window.history.back()">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
